<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة الأكواد الفورية 💬</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; --me-bg: #dcf8c6; --peer-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* الهيدر */
        .header { background: var(--primary); color: white; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        .my-id-label { font-size: 0.8em; opacity: 0.9; }
        #header-my-id { font-weight: bold; cursor: pointer; text-decoration: underline; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; }

        /* منطقة الرسائل */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--me-bg); border-bottom-left-radius: 2px; }
        .msg.peer { align-self: flex-start; background: var(--peer-bg); border-bottom-right-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* حاوية الكود */
        .code-container { background: #282c34; color: #abb2bf; padding: 10px; border-radius: 8px; margin-top: 5px; font-family: monospace; position: relative; overflow-x: auto; text-align: left; direction: ltr; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #1a73e8; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: sans-serif; }

        /* منطقة الإدخال */
        .input-area { background: white; padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; }
        textarea { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; font-size: 15px; resize: none; max-height: 100px; }
        .btn-send { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-send:disabled { background: #ccc; }

        /* نافذة الربط */
        #setup-overlay { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { width: 100%; max-width: 350px; text-align: center; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .setup-card h2 { color: var(--primary); margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; visibility: hidden; z-index: 1000; }
        #toast.show { visibility: visible; animation: fade 2.5s; }
        @keyframes fade { 0%, 100% { opacity: 0; } 10%, 90% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-card">
            <h2>شات الأكواد الآمن 💬</h2>
            <p class="my-id-label">معرف جهازك الخاص (اضغط للنسخ):</p>
            <h3 id="my-id-display" onclick="copyMyId()" style="color: #1a73e8; cursor: pointer; background: #e8f0fe; padding: 10px; border-radius: 10px;">... جاري التوليد ...</h3>
            <p style="font-size: 0.8em; color: #666;">أرسل هذا المعرف للجهاز الآخر</p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="peer-id-input" placeholder="أدخل معرف الجهاز الآخر هنا">
            <button onclick="connectToPeer()" style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px;">بدء الربط والدردشة</button>
        </div>
    </div>

    <div class="header">
        <div id="connection-status">بانتظار الربط...</div>
        <small>معرف جهازك: <span id="header-my-id" onclick="copyMyId()">-</span></small>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <textarea id="msg-input" placeholder="اكتب رسالة أو كود..." rows="1"></textarea>
        <button id="send-btn" class="btn-send" onclick="sendMessage()" disabled title="يجب الربط أولاً">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <div id="toast">تم النسخ! ✅</div>

<script>
    const peer = new Peer();
    let conn;
    let myId = "";

    // عند إنشاء معرف الجهاز
    peer.on('open', id => {
        myId = id;
        document.getElementById('my-id-display').innerText = id;
        document.getElementById('header-my-id').innerText = id;
    });

    // نسخ المعرف
    function copyMyId() {
        if (!myId) return;
        navigator.clipboard.writeText(myId);
        showToast("تم نسخ معرف جهازك بنجاح ✅");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = "show";
        setTimeout(() => t.className = "", 2500);
    }

    // وظيفة الربط عند الضغط على الزر
    function connectToPeer() {
        const remoteId = document.getElementById('peer-id-input').value.trim();
        if(!remoteId) {
            alert("يرجى إدخال معرف الجهاز الآخر أولاً");
            return;
        }
        
        showToast("جاري محاولة الربط... يرجى الانتظار");
        
        // محاولة الاتصال
        conn = peer.connect(remoteId);
        
        // إذا لم يستجب الطرف الآخر خلال 10 ثواني
        const timeout = setTimeout(() => {
            if (!conn.open) {
                alert("تعذر الاتصال. تأكد من أن الجهاز الآخر يفتح الصفحة ومتصل بنفس الشبكة.");
            }
        }, 10000);

        setupConnection();
    }

    // استقبال اتصال من جهاز آخر
    peer.on('connection', c => {
        conn = c;
        setupConnection();
    });

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('connection-status').innerText = "متصل الآن بجهاز آمن 🟢";
            document.getElementById('send-btn').disabled = false;
            showToast("تم الربط بنجاح! يمكنك المراسلة الآن.");
        });

        conn.on('data', data => {
            appendMessage('peer', data);
        });

        conn.on('close', () => {
            alert("انقطع الاتصال بالطرف الآخر.");
            location.reload(); // إعادة تحميل الصفحة للبدء من جديد
        });
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !conn) return;

        conn.send(text);
        appendMessage('me', text);
        input.value = "";
    }

    function appendMessage(sender, text) {
        const box = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender}`;

        // إذا كان النص يحتوي على أسطر أو رموز برمجية
        if (text.includes('\n') || text.includes('{') || text.includes('<')) {
            const codeId = 'code-' + Date.now();
            msgDiv.innerHTML = `
                <div class="code-container">
                    <button class="copy-btn" onclick="copyCode('${codeId}')">نسخ الكود</button>
                    <pre id="${codeId}" style="margin:0; white-space: pre-wrap;">${escapeHtml(text)}</pre>
                </div>
            `;
        } else {
            msgDiv.innerText = text;
        }

        box.appendChild(msgDiv);
        box.scrollTop = box.scrollHeight;
    }

    function copyCode(id) {
        const code = document.getElementById(id).innerText;
        navigator.clipboard.writeText(code);
        showToast("تم نسخ الكود بنجاح! ✅");
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
